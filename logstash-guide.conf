# =============================================================================
# LOGSTASH PIPELINE ДЛЯ ORDERHUB
# =============================================================================
# Назначение: прием логов от Filebeat, преобразование полей в формат ECS,
#             отправка в Elasticsearch для хранения и поиска
# =============================================================================

# -----------------------------------------------------------------------------
# INPUT - ОТКУДА БЕРЁМ ДАННЫЕ
# -----------------------------------------------------------------------------
input {
  # Используем beats input для приема данных от Filebeat
  # beats - это протокол, по которому Filebeat отправляет данные
  beats {
    port => 5000  # Порт, на котором Logstash слушает входящие соединения
                  # Filebeat должен быть настроен на отправку на этот порт

    # Альтернативные варианты input:
    # ---------------------------------
    # tcp {                     # Если приложение шлет напрямую по TCP
    #   port => 5000
    #   codec => json            # Ожидаем JSON-формат
    # }
    #
    # http {                     # Если приложение шлет по HTTP
    #   port => 8080
    #   codec => json
    # }
    #
    # file {                     # Чтение из файла (без Filebeat)
    #   path => "/var/log/*.log"
    #   start_position => "beginning"
    # }
    #
    # kafka {                     # Из Kafka (для высоких нагрузок)
    #   bootstrap_servers => "kafka:9092"
    #   topics => ["orderhub-logs"]
    #   codec => json
    # }
  }
}

# -----------------------------------------------------------------------------
# FILTER - ТРАНСФОРМАЦИЯ И ОБОГАЩЕНИЕ ДАННЫХ
# -----------------------------------------------------------------------------
filter {
  # MUTATE - основной фильтр для преобразования полей
  # Позволяет переименовывать, удалять, добавлять, преобразовывать поля
  mutate {
    # RENAME - переименовываем поля в соответствии со стандартом ECS
    # (Elastic Common Schema) - это стандарт именования полей,
    # чтобы все инструменты Elastic понимали друг друга
    # -----------------------------------------------------------------
    rename => {
      # Поле traceId из JSON-лога переименовываем в trace.id
      # trace.id - стандартное поле для идентификатора трассировки
      "traceId" => "[trace][id]"

      # spanId -> span.id для идентификатора спана
      "spanId"  => "[span][id]"

      # service -> service.name - имя сервиса (order-service, notification-service)
      "service" => "[service][name]"

      # level -> log.level - уровень логирования (INFO, DEBUG, ERROR)
      "level"   => "[log][level]"

      # logger_name -> log.logger - имя класса/логгера
      "logger_name" => "[log][logger]"

      # thread_name -> process.thread.name - имя потока выполнения
      "thread_name" => "[process][thread][name]"
    }

    # REMOVE_FIELD - удаляем ненужные поля, чтобы не засорять Elasticsearch
    # -----------------------------------------------------------------
    remove_field => [
      "@version",           # Служебное поле Logstash (не нужно в ES)
      "[event][original]",  # Дублирует message, можно удалить
      "[container][labels]", # Метки Docker контейнера (обычно не нужны)
      "[agent][ephemeral_id]", # Временный ID агента Filebeat
      "[agent][id]",         # Постоянный ID агента Filebeat
      "[agent][ephemeral_id]", # Дублируется (опечатка, но удалим оба)
      "[ecs][version]"       # Версия ECS (не обязательна)

      # Другие поля, которые можно удалить при необходимости:
      # "[host][name]",      # Имя хоста (иногда нужно оставить)
      # "[agent][version]",  # Версия Filebeat
      # "[log][offset]"      # Смещение в файле (только для Filebeat)
    ]

    # ADD_FIELD - добавляем служебные поля для удобной фильтрации в Kibana
    # -----------------------------------------------------------------
    add_field => {
      # event.dataset - для группировки логов по типу данных
      "event.dataset" => "requestservice.logs"

      # event.module - для группировки по модулю приложения
      "event.module"  => "requestservice"

      # Другие полезные поля, которые можно добавить:
      # "environment" => "production"     # Окружение (из переменной)
      # "data_stream.namespace" => "prod" # Для Data Streams (ES 8+)
      # "tags" => ["orderhub", "prod"]    # Теги для фильтрации
    }

    # ДРУГИЕ ВОЗМОЖНОСТИ MUTATE (не используются, но полезно знать)
    # -----------------------------------------------------------------
    # convert => {                        # Преобразование типов
    #   "order_id" => "integer"            # Строку в число
    #   "response_time" => "float"         # Строку в число с плавающей точкой
    #   "success" => "boolean"             # Строку в булево
    # }
    #
    # lowercase => [ "level" ]             # В нижний регистр
    # uppercase => [ "level" ]             # В верхний регистр
    #
    # gsub => [                             # Замена текста (маскирование)
    #   "message",                           # В поле message
    #   "[0-9]{16}",                         # Ищем 16 цифр подряд
    #   "****-****-****-****"                 # Заменяем на маску
    # ]
    #
    # update => {                            # Обновить существующее поле
    #   "message" => "Prefix - %{message}"    # Добавить префикс
    # }
  }

  # ДРУГИЕ ПОЛЕЗНЫЕ ФИЛЬТРЫ (не используются, но могут пригодиться)
  # -----------------------------------------------------------------

  # DATE - преобразование строки с датой в тип date для Elasticsearch
  # Если в логах есть кастомное поле с датой (например, timestamp)
  # date {
  #   match => ["timestamp", "ISO8601"]      # Из поля timestamp
  #   target => "@timestamp"                  # В стандартное поле ES
  # }

  # GEOIP - определение географического местоположения по IP
  # geoip {
  #   source => "client_ip"                    # Поле с IP-адресом
  #   target => "geo"                           # Куда сохранять результат
  # }

  # USERAGENT - парсинг User-Agent (браузер, ОС)
  # useragent {
  #   source => "user_agent"                    # Поле с User-Agent
  #   target => "ua"                             # Куда сохранять результат
  # }

  # DROP - отбрасывание ненужных логов (например, healthcheck-ов)
  # if [message] =~ "health" {
  #   drop { }
  # }

  # IF-ELSE - условная обработка (для разных типов логов)
  # if [service][name] == "order-service" {
  #   mutate { add_field => { "team" => "core" } }
  # } else if [service][name] == "notification-service" {
  #   mutate { add_field => { "team" => "notifications" } }
  # }
}

# -----------------------------------------------------------------------------
# OUTPUT - КУДА ОТПРАВЛЯЕМ ДАННЫЕ
# -----------------------------------------------------------------------------
output {
  # ELASTICSEARCH - основное хранилище для логов
  elasticsearch {
    # Адрес Elasticsearch (можно несколько через запятую)
    hosts => ["http://elasticsearch:9200"]

    # Шаблон имени индекса - логи разделяются по дням
    # %{+YYYY.MM.dd} автоматически подставляет текущую дату
    index => "orderhub-logs-%{+YYYY.MM.dd}"

    # Альтернативные форматы индексов:
    # index => "orderhub-logs-%{+YYYY.MM}"     # Помесячно
    # index => "orderhub-logs-%{[service][name]}-%{+YYYY.MM.dd}" # По сервисам

    # НАСТРОЙКИ ILM (Index Lifecycle Management) - для production
    # -----------------------------------------------------------------
    # В вашем конфиге ILM нет, но рекомендуется добавить:
    # ilm_enabled => true
    # ilm_rollover_alias => "orderhub-logs"
    # ilm_pattern => "000001"
    # ilm_policy => "orderhub-logs-policy"
    #
    # ILM позволяет автоматически:
    # - Создавать новый индекс при достижении размера (rollover)
    # - Перемещать старые индексы на медленные диски (warm phase)
    # - Удалять индексы через N дней (delete phase)

    # НАСТРОЙКИ АУТЕНТИФИКАЦИИ (если включена безопасность)
    # -----------------------------------------------------------------
    # user => "elastic"
    # password => "changeme"
    # ssl => true
    # ssl_certificate_verification => true

    # НАСТРОЙКИ ПРОИЗВОДИТЕЛЬНОСТИ
    # -----------------------------------------------------------------
    # flush_size => 500              # Отправлять пачками по 500 событий
    # idle_flush_time => 5            # Или каждые 5 секунд
    # bulk_max_size => 5000           # Максимальный размер пачки
    # worker_count => 2               # Количество потоков отправки
  }

  # STDOUT - для отладки (вывод в консоль)
  # -----------------------------------------------------------------
  # stdout {
  #   codec => rubydebug              # Красивый вывод с цветами
  #   # codec => json                  # Вывод в JSON (для автоматизации)
  # }

  # АЛЬТЕРНАТИВНЫЕ OUTPUTS
  # -----------------------------------------------------------------
  # file {                            # В файл (для отладки)
  #   path => "/tmp/logstash-debug.log"
  #   codec => json
  # }
  #
  # kafka {                            # В Kafka (для highload)
  #   bootstrap_servers => "kafka:9092"
  #   topic_id => "orderhub-logs"
  # }
  #
  # s3 {                                # В S3 (долгосрочное хранение)
  #   bucket => "orderhub-logs"
  #   region => "us-east-1"
  #   rotation_strategy => "size"
  #   size_file => 104857600            # 100 MB
  # }
}